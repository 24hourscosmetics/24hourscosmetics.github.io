<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24hours Cosmetics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #6D9BCC;
      color: #e2e8f0;
      font-family: "Space Grotesk", "Consolas", "Menlo", monospace;
    }

    header {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .hours-emblem {
      width: clamp(200px, 26vw, 420px); /* PC에서 더 크게 */
      height: auto; /* 비율 유지 */
      display: block;
    }

    @media (max-width: 768px) {
      .hours-emblem {
        width: clamp(96px, 30vw, 180px); /* 모바일에서 더 작게 */
      }
    }

    .typing {
      font-size: clamp(1.2rem, 4vw, 6rem);
      letter-spacing: 30%;
      line-height: 110%;
      font-weight: 700;
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      margin-left: 0.1em;
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }
    h1 {
      font-size: clamp(3rem, 4vw, 6rem);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* text5(text5 line) / text6(text6 line)만 살짝 강조 */
    #typed-text5,
    #typed-text6 {
      font-size: 1.5em;
    }

    #cursor5,
    #cursor6 {
      font-size: 1.5em;
      font-weight: bold;
    }
    .typing {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
    }
    #top-row {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding-right: 10px;
    }
  </style>
</head>
<body>
  <header>
    <img src="assets/images/emblem_B_SB.png" alt="24hours" class="hours-emblem" style="padding-bottom: 200px;">
  </header>
  <div class="typing" aria-label="24hours">
    <div id="top-row" class="top-row">
      <p>
        <span id="typed-text0"></span><span id="cursor0" class="cursor">|</span>
      </p>
    </div>
    <div class="bottom-col">
      <span id="typed-text"></span><span id="cursor1" class="cursor" style="display: none;">|</span><br/>
      <span id="typed-text2"></span><span id="cursor2" class="cursor" style="display: none;">|</span><br/>
      <span id="typed-text3"></span><span id="cursor3" class="cursor" style="display: none;">|</span><br/>
      <span id="typed-text4"></span><span id="cursor4" class="cursor" style="display: none;">|</span><br/>
      <span id="typed-text6"></span><span id="cursor6" class="cursor" style="display: none;">|</span><br/><br/>
    </div>
    <div class="logo">
      <img src="assets/images/Wordmark_Horizontal_W.png" id="hours-emblem" alt="24hours" class="hours-emblem" style="display: none;">
      <!-- <span id="typed-text6"></span><span id="cursor6" class="cursor" style="display: none;">|</span><br/><br/> -->
    </div>
    <!-- <span id="typed-text"></span><span id="cursor1" class="cursor">|</span><br/>
    <span id="typed-text2"></span><span id="cursor2" class="cursor" style="display: none;">|</span><br/>
    <span id="typed-text3"></span><span id="cursor3" class="cursor" style="display: none;">|</span><br/>
    <span id="typed-text4"></span><span id="cursor4" class="cursor" style="display: none;">|</span><br/>
    <span id="typed-text6"></span><span id="cursor6" class="cursor" style="display: none;">|</span><br/><br/>
    <span id="typed-text5"></span><span id="cursor5" class="cursor" style="display: none;">|</span> -->
  </div>
  <p>
    <span id="typed-text5"></span><span id="cursor5" class="cursor" style="display: none;">|</span>
  </p>

  <script>
    const text0 = "BE   "
    const text = "GLOWY";
    const text2 = "EFFORTLESS";
    const text3 = "PRETTY";
    const text4 = "YOURSELF";
    const text5 = "WE ARE ALMOST HERE.";
    const text6 = "......";
    const typedText = document.getElementById("typed-text");
    const typedText0 = document.getElementById("typed-text0");
    const typedText2 = document.getElementById("typed-text2");
    const typedText3 = document.getElementById("typed-text3");
    const typedText4 = document.getElementById("typed-text4");
    const typedText5 = document.getElementById("typed-text5");
    const typedText6 = document.getElementById("typed-text6");
    const time = 100;
    let index = 0;
    let index0 = 0;
    let index2 = 0;
    let index3 = 0;
    let index4 = 0;
    let index5 = 0;
    let index6 = 0;

    function type0() {
      if (index0 <= text0.length) {
        typedText0.textContent = text0.slice(0, index0);
        index0 += 1;
        setTimeout(type0, 300);
        if(index0 === text0.length) {
          document.querySelector("#cursor0").style.display = "none";
          document.querySelector("#cursor1").style.display = "inline-block";
          type();
        }
      }
    }
    function type() {
      if (index <= text.length) {
        typedText.textContent = text.slice(0, index);
        index += 1;
        setTimeout(type, time);
        if(index === text.length) {
          document.querySelector("#cursor1").style.display = "none";
          document.querySelector("#cursor2").style.display = "inline-block";
          type2();
        }
        return;
      }
      // setTimeout(() => {
      //   index = 0;
      //   type();
      // }, 1200);
    }

    function type2() {
      if (index2 <= text2.length) {
        typedText2.textContent = text2.slice(0, index2);
        index2 += 1;
        setTimeout(type2, time);
      }
      if(index2 === text2.length) {
          document.querySelector("#cursor2").style.display = "none";
          document.querySelector("#cursor3").style.display = "inline-block";
          type3();
      }
      return;
    }

    function type3() {
      if (index3 <= text3.length) {
        typedText3.textContent = text3.slice(0, index3);
        index3 += 1;
        setTimeout(type3, time);
      }
      if(index3 === text3.length) {
          document.querySelector("#cursor3").style.display = "none";
          document.querySelector("#cursor4").style.display = "inline-block";
          type4();
      }
    }

      function type4() {
        if (index4 <= text4.length) {
          typedText4.textContent = text4.slice(0, index4);
          index4 += 1;
          setTimeout(type4, time);
        }
        if(index4 === text4.length) {
            document.querySelector("#cursor4").style.display = "none";
            // document.querySelector("#cursor6").style.display = "inline-block";
            setTimeout(() => {
              type6();
            }, time);
        }
      } 
    function type6() {
      if (index6 <= text6.length) {
        typedText6.textContent = text6.slice(0, index6);
        index6 += 1;
        setTimeout(type6, time);
      }
      if(index6 === text6.length) {
          // document.querySelector("#cursor6").style.display = "none";
          setTimeout(() => {
            document.querySelector("#hours-emblem").style.display = "inline-block";
            type5();
            }, 1000);
      }
    }
    // type5: 중간에 지웠다가 다시 쓰는 효과(타이핑 -> 삭제 -> 다시 타이핑)
    let type5Phase = "typing"; // "typing" | "deleting" | "typing2"
    const deleteStartAt = Math.max(3, Math.floor(text5.length / 2)); // 중간 지우기 시작 지점
    let hasDeletedOnce = false;

    function type5() {
      if (type5Phase === "typing") {
        if (index5 <= text5.length) {
          typedText5.textContent = text5.slice(0, index5);
          index5 += 1;

          // 중간에서 한 번 지우기 시작
          if (!hasDeletedOnce && index5 === deleteStartAt) {
            hasDeletedOnce = true;
            type5Phase = "deleting";
          }

          setTimeout(type5, time);
        }
        return;
      }

      if (type5Phase === "deleting") {
        const deleteTime = Math.max(30, Math.floor(time * 0.6));

        if (index5 > 0) {
          index5 -= 1;
          typedText5.textContent = text5.slice(0, index5);
          setTimeout(type5, deleteTime);
          return;
        }

        // 다 지운 뒤 다시 타이핑
        type5Phase = "typing2";
        setTimeout(type5, time);
        return;
      }

      // type5Phase === "typing2"
      if (index5 <= text5.length) {
        typedText5.textContent = text5.slice(0, index5);
        index5 += 1;
        setTimeout(type5, time);
      }
      if(index5 === text5.length) {
          document.querySelector("#cursor5").style.display = "none";
      }
    }

    type0();
  </script>
</body>
</html>
